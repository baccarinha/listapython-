<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Prática de Python</title>

<style>
/* CARDS MAIS ORGANIZADOS */
.card {
    background: linear-gradient(135deg, #ec4899, #be185d);
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    transition: 0.3s;

    display: flex;
    flex-direction: column;
    gap: 10px; /* espaço entre elementos */
}

.card h3 {
    margin-bottom: 5px;
}

/* INPUT PADRÃO */
.card input {
    width: 100%;
    box-sizing: border-box;
}

/* GRID DOS 10 CAMPOS (MELHORADO) */
.inputs-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr); /* antes era 5 */
    gap: 8px;
}

/* RESULTADO MAIS SEPARADO */
.resultado {
    margin-top: 10px;
    color: #38bdf8;
    font-weight: bold;
    min-height: 20px;
}
</style>
</head>

<body>

<div class="container">
    <h1>💻 Exercícios de Programação</h1>

    <div class="grid-blocos">

        <!-- Par ou Ímpar -->
        <div class="card">
            <h3>Par ou Ímpar</h3>
            <input id="parNumero" placeholder="Digite um número">
            <button onclick="parImpar()">Executar</button>
            <div class="resultado" id="resPar"></div>
        </div>

        <!-- Celsius -->
        <div class="card">
            <h3>Celsius → Fahrenheit</h3>
            <input id="celsius" placeholder="Digite °C">
            <button onclick="converterTemp()">Executar</button>
            <div class="resultado" id="resTemp"></div>
        </div>

        <!-- Tabuada -->
        <div class="card">
            <h3>Tabuada</h3>
            <input id="tabuadaNum" placeholder="Número">
            <button onclick="tabuada()">Executar</button>
            <div class="resultado" id="resTabuada"></div>
        </div>

        <!-- Fatorial -->
        <div class="card">
            <h3>Fatorial</h3>
            <input id="fatorialNum" placeholder="Número">
            <button onclick="fatorial()">Executar</button>
            <div class="resultado" id="resFatorial"></div>
        </div>

        <!-- Maior e menor -->
        <div class="card">
            <h3>Maior e Menor Valor</h3>

            <div id="inputs1" class="inputs-grid">
                <input type="number"><input type="number"><input type="number"><input type="number"><input type="number">
                <input type="number"><input type="number"><input type="number"><input type="number"><input type="number">
            </div>

            <button onclick="maiorMenor()">Executar</button>
            <div class="resultado" id="resMaiorMenor"></div>
        </div>

        <!-- Ordenação -->
        <div class="card">
            <h3>Lista Ordenada (sem sort)</h3>

            <div id="inputs2" class="inputs-grid">
                <input type="number"><input type="number"><input type="number"><input type="number"><input type="number">
                <input type="number"><input type="number"><input type="number"><input type="number"><input type="number">
            </div>

            <button onclick="ordenarLista()">Executar</button>
            <div class="resultado" id="resOrdenado"></div>
        </div>

    </div>

    <!-- LINK FORA DA GRID -->
    <div style="margin-top:20px;">
        <a href="codigos.html">Ver códigos em Python →</a>
    </div>

</div>

<script>
// Par ou ímpar
function parImpar() {
    let num = Number(document.getElementById("parNumero").value);
    let res = (num % 2 === 0) ? "PAR" : "ÍMPAR";
    document.getElementById("resPar").innerText = res;
}

// Celsius
function converterTemp() {
    let c = Number(document.getElementById("celsius").value);
    let f = (c * 9/5) + 32;
    document.getElementById("resTemp").innerText = f + " °F";
}

// Tabuada
function tabuada() {
    let num = Number(document.getElementById("tabuadaNum").value);
    let resultado = "";

    for (let i = 1; i <= 10; i++) {
        resultado += `${num} x ${i} = ${num * i}<br>`;
    }

    document.getElementById("resTabuada").innerHTML = resultado;
}

// Fatorial
function fatorial() {
    let num = Number(document.getElementById("fatorialNum").value);
    let fat = 1;

    for (let i = 1; i <= num; i++) {
        fat *= i;
    }

    document.getElementById("resFatorial").innerText = fat;
}

// Pegar valores
function pegarValores(containerId) {
    let inputs = document.querySelectorAll(`#${containerId} input`);
    let valores = [];

    for (let input of inputs) {
        if (input.value === "") return null;
        valores.push(Number(input.value));
    }

    return valores;
}

// Maior/menor
function maiorMenor() {
    let valores = pegarValores("inputs1");

    if (!valores) {
        document.getElementById("resMaiorMenor").innerText = "Preencha todos!";
        return;
    }

    document.getElementById("resMaiorMenor").innerHTML =
        `Maior: ${Math.max(...valores)} <br> Menor: ${Math.min(...valores)}`;
}

// Ordenar
function ordenarLista() {
    let numeros = pegarValores("inputs2");

    if (!numeros) {
        document.getElementById("resOrdenado").innerText = "Preencha todos!";
        return;
    }

    let valores = [];

    for (let num of numeros) {
        let inserido = false;

        for (let j = 0; j < valores.length; j++) {
            if (num < valores[j]) {
                valores.splice(j, 0, num);
                inserido = true;
                break;
            }
        }

        if (!inserido) valores.push(num);
    }

    document.getElementById("resOrdenado").innerText =
        "Ordenado: " + valores.join(", ");
}
</script>

</body>
</html>
